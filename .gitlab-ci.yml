# .gitlab-ci.yml

stages:
  - test
  - report

variables:
  STAGE: prod
  SUITE: users

run-tests:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r requirements.txt
  script:
    - pytest -sv --alluredir=allure-results -m $SUITE
  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 1 day

generate-report:
  stage: report
  image: frankescobar/allure-docker-service
  script:
    - allure generate allure-results --clean -o allure-report
  artifacts:
    when: always
    paths:
      - allure-report/
    expire_in: 7 days
  dependencies:
    - run-tests