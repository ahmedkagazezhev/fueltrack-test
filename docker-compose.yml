version: "3.7"

services:
  api-tests:
    image: fueltrack-tests:v1
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/usr/workspace
    command: /bin/sh -c "pytest -sv --alluredir=allure-results -m ${SUITE:-users}"
    working_dir: /usr/workspace
    environment:
      STAGE: prod
      SUITE: users

  report:
    image: fueltrack-tests:v1
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/usr/workspace
    command: /bin/sh -c "allure generate allure-results --clean -o allure-report"
    working_dir: /usr/workspace
    depends_on:
      - api-tests